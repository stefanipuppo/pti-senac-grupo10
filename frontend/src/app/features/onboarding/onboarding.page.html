<section class="page">
  <header class="page-header">
    <h1>Entrar</h1>
    <p>Use seu e-mail e senha para criar uma conta ou entrar em uma existente.</p>
  </header>

  <form class="form" (ngSubmit)="submit()">
    <label class="field">
      <span>Nome</span>
      <input
        type="text"
        [(ngModel)]="nome"
        name="nome"
        required
      />
    </label>

    <label class="field">
      <span>E-mail</span>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        required
      />
    </label>

    <label class="field">
      <span>Cidade</span>
      <input
        type="text"
        [(ngModel)]="cidade"
        name="cidade"
        required
      />
    </label>

    <label class="field">
      <span>Senha</span>
      <input
        type="password"
        [(ngModel)]="senha"
        name="senha"
        minlength="6"
        required
      />
    </label>

    <label class="field">
      <span>Confirmar senha</span>
      <input
        type="password"
        [(ngModel)]="confirmarSenha"
        name="confirmarSenha"
        minlength="6"
        required
      />
    </label>

    <button
      type="submit"
      class="button-primary"
      [disabled]="
        isSubmitting() ||
        !nome ||
        !email ||
        !cidade ||
        !senha ||
        senha.length < 6 ||
        !confirmarSenha
      "
    >
      {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
    </button>

    <p class="hint">
      Se o e-mail já existir, vamos reutilizar o usuário automaticamente, desde que a senha esteja correta.
    </p>

    <p class="error" *ngIf="errorMessage() as error">
      {{ error }}
    </p>
  </form>
</section>
